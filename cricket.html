<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket height</title>
    <style>
        .field {
            border: 1px solid steelblue;
        }

        .field:hover .bat {
            transform: rotate(-60deg);
            transform-origin: bottom right;
            border: 3px solid steelblue;
            padding: 50px;
        }

        .field:hover .bat {
            transform: rotate(60deg);
            transform-origin: top left;

        }
        .bat{
            transition: transform 0.1s ease-in;
        }

        .ball{
height: 50px;
width: 50px;
background-color: red;
border-radius: 50%;
            height: 50px;
            width: 50px;
            border-radius: 50%;
            background-color: red;
            position: relative;
            left: 515px;
            transition: transform 1s ease-out 0.2s;
        }
    </style>
</head>

<body>
    <div class="field">
        <img src="image/—Pngtree—pattern cricket bat clipart ball_6024969.png" class="bat" alt="bat">
    <div class="ball"></div>
    </div>
</body>

</html>
