<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket height</title>
    <style>
        .field {
            border: 1px solid steelblue;
        }

        .field:hover .bat {
            transform: rotate(-60deg);
            transform-origin: bottom right;

        }

        .ball{
height: 50px;
width: 50px;
background-color: red;
border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="field">
        <img src="image/cricket bat clipart ball_6024969.png" class="bat" alt="bat">
        <div class="ball"></div>
    </div>
</body>

</html>
