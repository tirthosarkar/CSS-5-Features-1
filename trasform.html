<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        .container, .inner{
            width: 200px;
            height: 200px;
        }

        .container{
            background-color: aquamarine;
border: 2px solid   steelblue;
        }
        .inner{
            border: 2px solid tomato;
            background-color: palegoldenrod;
            /* transform: scale(0.25, 0.50); */
            /* transform: rotate(45deg); */
            /* transform: scale(0.5) rotate(45deg) translateY(-150px); */
           /* transform: translatex(50px); */

        }
.inner:hover{
  transform: rotate(45deg) scale(0.50) translateY(-150px);
}



    </style>
</head>

<body>
    <h2>
    Example of Transform property in CSS.
    </h2>
    <!-- .container*3{Container $}>.inner{Inner $} -->

      <div class="container">
        <div class="inner">Inner 1</div>
      </div>
      <div class="container">
        <div class="inner">Inner 2</div>
      </div>
      <div class="container">
        <div class="inner">Inner 3</div>
      </div>
</body>

</html>
