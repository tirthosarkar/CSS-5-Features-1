<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        @keyframes moveBall {
            from {
                left: 0;
            }

            to {
                left: 500px;
                background-color: blue;
            }
        }

        @keyframes bounce {
            0% {
                left: 0;
                top: 0;
                
            }

            25% {
                left: 150px;
                top: 200px;
                background-color: red;
            }

            50% {
                 left: 300px;
                top: 0px;
                background-color: yellow;
            }

            100% {
                 left: 500px;
                top: 200px;
                background-color: blue;
            }
        }

        .stage {
            width: 600px;
            height: 300px;
            border: 2px solid #ccc;
            position: relative;
            background-color: green;
        }

        .ball {
            width: 100px;
            height: 100px;
            background-color: red;
            border-radius: 50%;
            position: relative;
            /* animation: moveBall 2s ease-in-out 1s infinite alternate; */
            animation: bounce 3s ease-in-out 1s infinite alternate;

        }
    </style>
</head>

<body>
    <h2>Example Animation</h2>
    <div class="stage">
        <div class="ball"></div>
    </div>
</body>

</html>
